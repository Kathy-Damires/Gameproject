kind = "web"
previewPath = "/"
title = "Project Evolvion UI"
version = "1.0.0"
id = "artifacts/evolvion-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22575
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/evolvion-ui run dev"

[services.env]
PORT = "22575"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/evolvion-ui", "run", "build"]
publicDir = "artifacts/evolvion-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
